{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header text-center py-4" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;">
                <i class="fas fa-sign-in-alt fa-2x mb-2 d-block"></i>
                <h4 class="mb-0 fw-bold">Sign In</h4>
                <p class="mb-0 small opacity-75">Enter your credentials to continue</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-600">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-600">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0 text-muted small">
                    Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-600">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
