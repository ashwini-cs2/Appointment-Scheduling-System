{% extends 'base.html' %}
{% block title %}Add Review{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header py-3" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;">
                <h5 class="mb-0"><i class="fas fa-star me-2"></i>Submit Review</h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-600">Rating (1–5)</label>
                        {{ form.rating }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-600">Comment</label>
                        {{ form.comment }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane me-2"></i>Submit Review
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
