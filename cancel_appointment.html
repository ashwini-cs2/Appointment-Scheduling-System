{% extends 'base.html' %}
{% block title %}Cancel Appointment{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-header py-3" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;">
                <h5 class="mb-0"><i class="fas fa-times-circle me-2"></i>Cancel Appointment</h5>
            </div>
            <div class="card-body p-4">
                <div class="mb-3 p-3 bg-light rounded-3">
                    <p class="mb-1"><strong>Staff:</strong> {{ appointment.staff.name }}</p>
                    <p class="mb-1"><strong>Date:</strong> {{ appointment.appointment_date }}</p>
                    <p class="mb-0"><strong>Time:</strong> {{ appointment.start_time }}</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-600">Reason (optional)</label>
                        {{ form.reason }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger flex-fill">
                            <i class="fas fa-times me-2"></i>Confirm Cancellation
                        </button>
                        <a href="{% url 'my_appointments' %}" class="btn btn-outline-secondary flex-fill">Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
